<!doctype html>
<html lang="zh-CN" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Volo</title>
    <script>
      /* theme bootstrap — apply persisted theme before paint */
      (function () { try { var t = localStorage.getItem('volo-theme'); if (t) document.documentElement.setAttribute('data-theme', t); } catch (e) {} })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" />
  </head>

  <body>
    <div class="viewport"><div id="root"></div></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
